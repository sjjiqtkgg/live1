name: Keep Render Service Alive

on:
  schedule:
    # UTC 时间，每 10 分钟执行一次（每天 0-16 UTC，对应北京时间 8-24 点）
    - cron: '*/10 0-16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: curl -X GET https://live1-cxe9.onrender.com/health
